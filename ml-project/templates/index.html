<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detection</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        textarea {
            width: 90%;
            height: 120px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .real {
            color: green;
        }

        .fake {
            color: red;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📰 Fake News Detection System</h1>

        <form action="/predict" method="post">
            <textarea name="news" placeholder="Enter news text here..."></textarea><br>
            <button type="submit">Predict</button>
        </form>

        {% if prediction %}
            <div class="result 
                {% if 'Real' in prediction %} real 
                {% else %} fake 
                {% endif %}">
                {{ prediction }}
            </div>
        {% endif %}

        <div class="footer">
            Built using Machine Learning (SVM + TF-IDF)
        </div>
    </div>

</body>
</html>
